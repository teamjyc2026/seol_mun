<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1"/>
<title>아이 에니어그램 검사</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css"/>
<style>
:root{
  --paper:#FBF7EE; --paper2:#F5EFE1; --ink:#2E3A2C; --ink-soft:#5B6656;
  --line:#E4DCC8; --line2:#D8CDB2;
  --green:#2F6B4F; --green-d:#245740; --marigold:#F2A93B; --coral:#E8734A;
  --sage:#EFF3E7; --card:#FFFDF7;
  --t1:#2F6B4F; --t2:#E8734A; --t3:#F2A93B; --t4:#8E5B8E; --t5:#3E8B8B;
  --t6:#4A6FA5; --t7:#E0B12E; --t8:#C0503A; --t9:#7A9A6B;
  --shadow:0 1px 2px rgba(46,58,44,.06),0 8px 24px rgba(46,58,44,.07);
  --radius:18px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  font-family:"Pretendard","Pretendard Variable",-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
  background:var(--paper); color:var(--ink);
  line-height:1.55; letter-spacing:-0.01em;
  -webkit-font-smoothing:antialiased;
}
.wrap{max-width:760px;margin:0 auto;padding:22px 18px 90px}
.admin .wrap{max-width:1080px}
h1,h2,h3{margin:0;font-weight:800;letter-spacing:-0.03em;line-height:1.2}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select{font-family:inherit}
.hidden{display:none!important}

/* top brand */
.brand{display:flex;align-items:center;gap:11px;margin-bottom:26px}
.mark{width:38px;height:38px;flex:0 0 auto}
.brand .txt b{display:block;font-size:16px;font-weight:800;letter-spacing:-0.02em}
.brand .txt span{display:block;font-size:12px;color:var(--ink-soft);letter-spacing:0.02em}
.brand .adminlink{margin-left:auto;font-size:12px;color:var(--ink-soft);
  border:1px solid var(--line2);padding:7px 12px;border-radius:99px;background:var(--card);transition:.15s}
.brand .adminlink:hover{color:var(--green);border-color:var(--green)}

/* hero */
.hero{text-align:center;padding:14px 6px 6px}
.hero .bloom{margin:6px auto 20px}
.hero h1{font-size:clamp(27px,6.5vw,40px);margin-bottom:14px}
.hero h1 .hl{color:var(--green);position:relative;white-space:nowrap}
.hero p{font-size:15px;color:var(--ink-soft);max-width:460px;margin:0 auto 8px}
.meta-row{display:flex;gap:9px;justify-content:center;flex-wrap:wrap;margin:22px 0 30px}
.chip{font-size:12.5px;color:var(--green-d);background:var(--sage);
  border:1px solid #dbe6cf;padding:7px 13px;border-radius:99px;font-weight:600}
.cta{display:inline-flex;align-items:center;gap:9px;background:var(--green);color:#fff;
  font-size:16px;font-weight:700;padding:15px 30px;border-radius:99px;box-shadow:var(--shadow);
  transition:transform .12s ease,background .15s}
.cta:hover{background:var(--green-d);transform:translateY(-1px)}
.cta:active{transform:translateY(0)}
.cta.wide{width:100%;justify-content:center}
.cta.ghost{background:var(--card);color:var(--green);border:1.5px solid var(--line2);box-shadow:none}
.cta.ghost:hover{border-color:var(--green);background:var(--sage)}
.cta[disabled]{opacity:.4;pointer-events:none}

/* card */
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
  padding:22px;box-shadow:var(--shadow)}
.eyebrow{font-size:12px;font-weight:700;letter-spacing:0.1em;color:var(--coral);text-transform:uppercase;margin-bottom:9px}

/* form */
.field{margin-bottom:16px}
.field label{display:block;font-size:13.5px;font-weight:700;margin-bottom:7px;color:var(--ink)}
.field .req{color:var(--coral)}
.field input,.field select{width:100%;padding:13px 14px;font-size:15px;color:var(--ink);
  background:var(--paper);border:1.5px solid var(--line2);border-radius:12px;transition:.15s;outline:none}
.field input:focus,.field select:focus{border-color:var(--green);background:#fff}
.two{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.seg{display:flex;gap:8px}
.seg button{flex:1;padding:12px;font-size:14px;font-weight:600;border:1.5px solid var(--line2);
  border-radius:12px;background:var(--paper);color:var(--ink-soft);transition:.12s}
.seg button.on{background:var(--green);color:#fff;border-color:var(--green)}

/* progress */
.topbar{position:sticky;top:0;z-index:20;background:rgba(251,247,238,.92);
  backdrop-filter:blur(8px);padding:12px 0 10px;margin:-22px -18px 18px;padding-left:18px;padding-right:18px}
.pbar-row{display:flex;align-items:center;gap:12px}
.pbar{flex:1;height:9px;background:var(--paper2);border-radius:99px;overflow:hidden;border:1px solid var(--line)}
.pbar i{display:block;height:100%;background:linear-gradient(90deg,var(--marigold),var(--green));
  border-radius:99px;transition:width .4s cubic-bezier(.4,0,.2,1)}
.pcount{font-size:12.5px;font-weight:700;color:var(--ink-soft);white-space:nowrap}

/* quiz */
.testhead{display:flex;align-items:center;gap:14px;margin:6px 0 20px}
.testhead .dot{width:44px;height:44px;border-radius:13px;display:grid;place-items:center;
  color:#fff;font-weight:800;font-size:19px;flex:0 0 auto;box-shadow:var(--shadow)}
.testhead h2{font-size:20px}
.testhead .sub{font-size:12.5px;color:var(--ink-soft);font-weight:600;margin-top:2px}
.qlist{display:flex;flex-direction:column;gap:11px}
.q{background:var(--card);border:1px solid var(--line);border-radius:15px;padding:15px 16px;transition:.15s}
.q.miss{border-color:var(--coral);background:#fdf3ee}
.q .qtxt{font-size:14.5px;font-weight:500;margin-bottom:12px;display:flex;gap:9px}
.q .qtxt .n{color:var(--green);font-weight:800;flex:0 0 auto}
.likert{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
.likert button{padding:9px 4px 8px;border:1.5px solid var(--line2);border-radius:10px;background:var(--paper);
  display:flex;flex-direction:column;align-items:center;gap:3px;transition:.12s}
.likert button .num{font-size:15px;font-weight:800;color:var(--ink-soft)}
.likert button .lab{font-size:9.5px;color:var(--ink-soft);line-height:1.15;text-align:center}
.likert button.on{border-color:var(--green);background:var(--green)}
.likert button.on .num,.likert button.on .lab{color:#fff}
.navrow{display:flex;gap:11px;margin-top:22px}
.navrow .cta{flex:1}
.scalehint{font-size:11.5px;color:var(--ink-soft);text-align:center;margin:14px 0 4px;background:var(--paper2);
  padding:9px 12px;border-radius:10px;border:1px solid var(--line)}

/* review + done */
.rev-scores{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:16px 0}
.rev-scores .s{background:var(--paper);border:1px solid var(--line);border-radius:12px;padding:11px;text-align:center}
.rev-scores .s .nm{font-size:11.5px;color:var(--ink-soft);font-weight:600}
.rev-scores .s .vl{font-size:20px;font-weight:800;margin-top:3px}
.done-hero{text-align:center;padding:20px 10px}
.done-hero .big{font-size:26px;font-weight:800;margin:16px 0 8px}
.top-badge{display:inline-flex;flex-direction:column;align-items:center;gap:4px;
  background:var(--sage);border:1px solid #d3e2c6;border-radius:16px;padding:16px 26px;margin:10px 0 18px}
.top-badge .k{font-size:12px;color:var(--ink-soft);font-weight:600}
.top-badge .v{font-size:24px;font-weight:800}

/* admin */
.admin-gate{max-width:400px;margin:40px auto}
.stat-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:12px;margin-bottom:20px}
.stat{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;text-align:center;box-shadow:var(--shadow)}
.stat .v{font-size:26px;font-weight:800;color:var(--green)}
.stat .k{font-size:12px;color:var(--ink-soft);font-weight:600;margin-top:2px}
.toolbar{display:flex;gap:10px;align-items:center;margin-bottom:16px;flex-wrap:wrap}
.toolbar .grow{flex:1}
.btn-sm{font-size:13px;font-weight:600;padding:9px 15px;border-radius:10px;background:var(--card);
  border:1.5px solid var(--line2);color:var(--ink);transition:.15s}
.btn-sm:hover{border-color:var(--green);color:var(--green)}
.btn-sm.danger:hover{border-color:var(--coral);color:var(--coral)}
.search{padding:10px 14px;font-size:14px;border:1.5px solid var(--line2);border-radius:10px;background:var(--card);min-width:160px}
.sub-list{display:flex;flex-direction:column;gap:12px}
.sub-item{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px 18px;box-shadow:var(--shadow)}
.sub-top{display:flex;align-items:center;gap:12px;cursor:pointer}
.sub-top .who{flex:1;min-width:0}
.sub-top .who b{font-size:16px;font-weight:800}
.sub-top .who span{font-size:12.5px;color:var(--ink-soft);display:block;margin-top:1px}
.sub-top .tag{font-size:12px;font-weight:800;color:#fff;padding:6px 13px;border-radius:99px;white-space:nowrap}
.sub-top .chev{color:var(--ink-soft);font-size:13px;transition:transform .2s}
.sub-item.open .chev{transform:rotate(90deg)}
.sub-detail{margin-top:16px;padding-top:16px;border-top:1px dashed var(--line2);display:none;
  grid-template-columns:auto 1fr;gap:22px;align-items:center}
.sub-item.open .sub-detail{display:grid}
.bars{display:flex;flex-direction:column;gap:8px;min-width:0}
.bar-row{display:flex;align-items:center;gap:10px;font-size:13px}
.bar-row .bn{width:118px;flex:0 0 auto;font-weight:600;color:var(--ink);display:flex;gap:7px;align-items:center}
.bar-row .bn .sw{width:9px;height:9px;border-radius:3px;flex:0 0 auto}
.bar-row .track{flex:1;height:14px;background:var(--paper2);border-radius:99px;overflow:hidden;border:1px solid var(--line)}
.bar-row .track i{display:block;height:100%;border-radius:99px;transition:width .6s cubic-bezier(.4,0,.2,1)}
.bar-row .bv{width:32px;text-align:right;font-weight:800;font-size:13px}
.enneabox{text-align:center}
.enneabox .cap{font-size:11px;color:var(--ink-soft);margin-top:4px;font-weight:600}
.del-row{margin-top:14px;text-align:right}
.empty{text-align:center;padding:60px 20px;color:var(--ink-soft)}
.empty .em-mark{margin-bottom:14px;opacity:.5}
.foot{margin-top:26px;font-size:11.5px;color:var(--ink-soft);text-align:center;line-height:1.7}
.note{font-size:12px;color:var(--ink-soft);background:var(--paper2);border:1px solid var(--line);
  border-radius:10px;padding:11px 13px;margin-top:14px;line-height:1.6}
@media(max-width:560px){
  .sub-detail{grid-template-columns:1fr;gap:16px}
  .bar-row .bn{width:96px;font-size:12px}
  .rev-scores{grid-template-columns:repeat(3,1fr)}
  .likert button .lab{display:none}
  .likert button{padding:12px 4px}
}
</style>
</head>
<body>
<div class="wrap" id="app"></div>

/* ---------- storage ---------- */
const KEY="enn:sub:";
async function saveSub(o){ await window.storage.set(KEY+o.id, JSON.stringify(o), true); }
async function listSubs(){
  let keys=[];
  try{ const r=await window.storage.list(KEY,true); keys=(r&&r.keys)||[]; }catch(e){ return []; }
  const out=[];
  for(const k of keys){ try{ const g=await window.storage.get(k,true); if(g&&g.value) out.push(JSON.parse(g.value)); }catch(e){} }
  out.sort((a,b)=>b.createdAt-a.createdAt);
  return out;
}
async function delSub(id){ try{ await window.storage.delete(KEY+id,true); }catch(e){} }

const $=(s,el=document)=>el.querySelector(s);

function bloomSVG(filled,size=96){
  // 9 petals radial; filled = number of completed tests
  let petals="";
  for(let i=0;i<9;i++){
    const ang=(i/9)*360-90;
    const on=i<filled;
    const col=on?TYPES[i+1].hex:"#E4DCC8";
    petals+=`<g transform="rotate(${ang} 50 50)"><ellipse cx="50" cy="24" rx="8.5" ry="16" fill="${col}" opacity="${on?1:.55}"/></g>`;
  }
  return `<svg class="bloom" width="${size}" height="${size}" viewBox="0 0 100 100" aria-hidden="true">${petals}<circle cx="50" cy="50" r="11" fill="#F2A93B"/><circle cx="50" cy="50" r="6" fill="#E8734A"/></svg>`;
}
function esc(s){return String(s==null?"":s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}

function computeScores(ans){
  const s={},raw={}; let total=0;
  for(let t=1;t<=9;t++){ const sum=ans[t].reduce((a,b)=>a+(b||0),0); s[t]=sum; raw[t]=ans[t].slice(); total+=sum; }
  let top=1; for(let t=2;t<=9;t++) if(s[t]>s[top]) top=t;
  return {scores:s,total,top};
}

  if(ST.screen==="admin") return renderAdmin();
}
function brand(withAdmin){
  return `<div class="brand">
    ${bloomSVG(9,38).replace('class="bloom"','')}
    <div class="txt"><b>아이 에니어그램 검사</b><span>유아 · 초등학생 성격유형 검사</span></div>
    ${withAdmin?`<button class="adminlink" onclick="go('admin-login')">관리자</button>`:""}
  </div>`;
}

/* ---- QUIZ ---- */
function answeredCount(){ let c=0; for(let t=1;t<=9;t++) c+=ST.answers[t].filter(x=>x>0).length; return c; }
function renderQuiz(){
  const t=ST.test, qs=QUESTIONS[t], T=TYPES[t];
  const done=answeredCount(), pct=Math.round(done/135*100);
  let rows="";
  qs.forEach((q,idx)=>{
    const val=ST.answers[t][idx];
    let btns="";
    for(let v=1;v<=5;v++){
      btns+=`<button class="${val===v?'on':''}" onclick="pick(${t},${idx},${v})">
        <span class="num">${v}</span><span class="lab">${SCALE[v-1].replace('\n','<br/>')}</span></button>`;
    }
    rows+=`<div class="q" id="q-${idx}"><div class="qtxt"><span class="n">${idx+1}</span><span>${esc(q)}</span></div>
      <div class="likert">${btns}</div></div>`;
  });
  app.innerHTML = `
   <div class="topbar"><div class="pbar-row">
     <div class="pbar"><i style="width:${pct}%"></i></div>
     <div class="pcount">${done}/135</div>
   </div></div>
   <div class="testhead">
     <div class="dot" style="background:${T.color}">${AREA[t-1]}</div>
     <div><h2>영역 ${AREA[t-1]} <span style="font-weight:600;color:var(--ink-soft);font-size:14px">전체 9개 중</span></h2>
       <div class="sub">아이의 평소 모습을 떠올리며 답해 주세요</div></div>
   </div>
   <div class="scalehint">${SCALE_FULL}</div>
   <div class="qlist">${rows}</div>
   <div class="navrow">
     ${t>1?`<button class="cta ghost" style="flex:0 0 auto;padding-left:22px;padding-right:22px" onclick="prevTest()">이전</button>`:''}
     <button class="cta" onclick="nextTest()">${t<9?'다음 유형 &nbsp;→':'응답 확인하기 &nbsp;→'}</button>
   </div>
   <div class="foot">${t} / 9 영역</div>`;
}
window.pick=function(t,idx,v){
  ST.answers[t][idx]=v;
  const q=$("#q-"+idx); q.classList.remove("miss");
  const btns=q.querySelectorAll(".likert button");
  btns.forEach((b,bi)=>b.classList.toggle("on",bi===v-1));
  // update progress
  const done=answeredCount(),pct=Math.round(done/135*100);
  const bar=$(".pbar i"), cnt=$(".pcount");
  if(bar)bar.style.width=pct+"%"; if(cnt)cnt.textContent=done+"/135";
};
function firstMissing(t){ return ST.answers[t].findIndex(x=>x===0); }
window.nextTest=function(){
  const miss=firstMissing(ST.test);
  if(miss>=0){
    const q=$("#q-"+miss); q.classList.add("miss");
    q.scrollIntoView({behavior:"smooth",block:"center"});
    return;
  }
  if(ST.test<9){ ST.test++; render(); } else go('review');
};
window.prevTest=function(){ if(ST.test>1){ ST.test--; render(); } };

/* ---- REVIEW ---- */
function renderReview(){
  const {scores,total,top}=computeScores(ST.answers);
  let cells="";
  for(let t=1;t<=9;t++){
    cells+=`<div class="s"><div class="nm">영역 ${AREA[t-1]}</div><div class="vl" style="color:${TYPES[t].color}">${scores[t]}</div></div>`;
  }
  app.innerHTML = brand(false) + `
   <div class="card">
     <div class="eyebrow">마지막 · 확인</div>
     <h2>${esc(ST.info.name||'우리 아이')} 응답 요약</h2>
     <p style="font-size:13.5px;color:var(--ink-soft);margin:8px 0 4px">각 영역별 점수(15~75점)입니다. 제출하면 담당 선생님에게 전달돼요.</p>
     <div class="rev-scores">${cells}</div>
     <div class="note">검사 결과 유형은 담당 선생님이 확인한 뒤 안내해 드려요. 이 화면에서는 영역별 점수만 보여드립니다.</div>
     <div class="navrow">
       <button class="cta ghost" style="flex:0 0 auto;padding-left:22px;padding-right:22px" onclick="ST.test=9;go('quiz')">이전</button>
       <button class="cta" id="submit-btn" onclick="submitAll()">제출하기 &nbsp;✓</button>
     </div>
     <div class="note">제출 후에는 수정할 수 없어요. 응답을 한 번 더 확인해 주세요.</div>
   </div>`;
}
window.submitAll=async function(){
  const btn=$("#submit-btn"); if(btn){btn.textContent="제출 중…";btn.setAttribute("disabled","");}
  const {scores,total,top}=computeScores(ST.answers);
  const sub={ id:Date.now().toString(36)+Math.random().toString(36).slice(2,6),
    createdAt:Date.now(), info:{...ST.info}, answers:JSON.parse(JSON.stringify(ST.answers)),
    scores, total, top };
  try{ await saveSub(sub); ST.lastTop=top; ST.lastScores=scores; go('done'); }
  catch(e){ if(btn){btn.textContent="다시 시도";btn.removeAttribute("disabled");} alert("저장에 실패했어요. 잠시 후 다시 시도해 주세요."); }
};

/* ---- ADMIN DASHBOARD ---- */
let ADMIN_CACHE=[], ADMIN_FILTER="";
async function renderAdmin(){
  app.innerHTML = brand(false) + `<div id="adm-body"><div class="empty">${bloomSVG(3,60)}<div>불러오는 중…</div></div></div>`;
  ADMIN_CACHE = await listSubs();
  paintAdmin();
}
function typeDistribution(list){
  const d={}; for(let t=1;t<=9;t++)d[t]=0;
  list.forEach(s=>{ d[s.top]=(d[s.top]||0)+1; });
  return d;
}
function paintAdmin(){
  const body=$("#adm-body"); if(!body)return;
  const all=ADMIN_CACHE;
  const list = ADMIN_FILTER
    ? all.filter(s=> (s.info.name||"").includes(ADMIN_FILTER) || (s.info.parent||"").includes(ADMIN_FILTER) || (s.info.phone||"").includes(ADMIN_FILTER))
    : all;
  if(all.length===0){
    body.innerHTML=`<div class="empty">${bloomSVG(0,72)}<div style="font-weight:700;margin-bottom:4px">아직 제출된 결과가 없어요</div>
      <div style="font-size:13px">학부모님이 검사를 완료하면 여기에 표시됩니다.</div></div>
      ${adminFoot()}`;
    return;
  }
  const dist=typeDistribution(all);
  let topType=1; for(let t=2;t<=9;t++) if(dist[t]>dist[topType])topType=t;
  const stat=`<div class="stat-row">
     <div class="stat"><div class="v">${all.length}</div><div class="k">전체 검사 수</div></div>
     <div class="stat"><div class="v">${dist[topType]>0?TYPES[topType].name:'–'}</div><div class="k">가장 많은 유형</div></div>
     <div class="stat"><div class="v">${new Set(all.map(s=>s.info.name)).size}</div><div class="k">검사한 아이</div></div>
   </div>`;
  const tools=`<div class="toolbar">
     <input class="search" placeholder="이름·학부모·연락처 검색" value="${esc(ADMIN_FILTER)}" oninput="ADMIN_FILTER=this.value;paintAdmin()"/>
     <div class="grow"></div>
     <button class="btn-sm" onclick="exportCSV()">CSV 내보내기</button>
     <button class="btn-sm" onclick="renderAdmin()">새로고침</button>
     <button class="btn-sm" onclick="go('home')">검사 화면</button>
   </div>`;
  let items="";
  list.forEach(s=>{
    const T=TYPES[s.top]; const d=new Date(s.createdAt);
    const when=`${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    let bars="";
    const maxv=75;
    for(let t=1;t<=9;t++){
      const w=Math.round(s.scores[t]/maxv*100);
      bars+=`<div class="bar-row"><div class="bn"><span class="sw" style="background:${TYPES[t].hex}"></span>${t}.${TYPES[t].name}</div>
        <div class="track"><i style="width:${w}%;background:${TYPES[t].hex}"></i></div><div class="bv">${s.scores[t]}</div></div>`;
    }
    items+=`<div class="sub-item" id="si-${s.id}">
      <div class="sub-top" onclick="toggleItem('${s.id}')">
        <div class="who"><b>${esc(s.info.name||'이름 없음')}</b>
          <span>${esc([s.info.age,s.info.gender].filter(Boolean).join(' · '))}${s.info.parent?' · 학부모 '+esc(s.info.parent):''}${s.info.phone?' · '+esc(s.info.phone):''} · ${when}</span></div>
        <div class="tag" style="background:${T.color}">${s.top}. ${T.name}</div>
        <div class="chev">▶</div>
      </div>
      <div class="sub-detail">
        <div class="enneabox">${enneaChart(s.scores,s.top)}<div class="cap">유형별 점수 분포</div></div>
        <div class="bars">${bars}
          <div class="del-row"><button class="btn-sm danger" onclick="removeItem('${s.id}')">이 결과 삭제</button></div>
        </div>
      </div>
    </div>`;
  });
  body.innerHTML = stat + tools + `<div class="sub-list">${items||'<div class="empty">검색 결과가 없어요.</div>'}</div>` + adminFoot();
}
function adminFoot(){
  return `<div class="foot">이 페이지의 결과는 브라우저 공용 저장소에 저장됩니다.<br/>중요한 자료는 CSV로 내려받아 별도 보관하시길 권장해요.</div>`;
}
window.toggleItem=function(id){ const el=$("#si-"+id); if(el)el.classList.toggle("open"); };
window.removeItem=async function(id){
  if(!confirm("이 검사 결과를 삭제할까요? 되돌릴 수 없어요.")) return;
  await delSub(id); ADMIN_CACHE=ADMIN_CACHE.filter(s=>s.id!==id); paintAdmin();
};
function enneaChart(scores,top){
  // radial 9-axis chart
  const cx=90,cy=90,R=66,maxv=75;
  let axes="",poly=[],dots="";
  for(let t=1;t<=9;t++){
    const ang=((t-1)/9)*2*Math.PI - Math.PI/2;
    const ex=cx+Math.cos(ang)*R, ey=cy+Math.sin(ang)*R;
    axes+=`<line x1="${cx}" y1="${cy}" x2="${ex.toFixed(1)}" y2="${ey.toFixed(1)}" stroke="#E4DCC8" stroke-width="1"/>`;
    const r=(scores[t]/maxv)*R;
    const px=cx+Math.cos(ang)*r, py=cy+Math.sin(ang)*r;
    poly.push(`${px.toFixed(1)},${py.toFixed(1)}`);
    dots+=`<circle cx="${px.toFixed(1)}" cy="${py.toFixed(1)}" r="${t===top?4:2.5}" fill="${TYPES[t].hex}"/>`;
    const lx=cx+Math.cos(ang)*(R+11), ly=cy+Math.sin(ang)*(R+11);
    axes+=`<text x="${lx.toFixed(1)}" y="${(ly+3).toFixed(1)}" font-size="9" fill="#5B6656" text-anchor="middle" font-weight="700">${t}</text>`;
  }
  // rings
  let rings="";
  [0.33,0.66,1].forEach(f=>{ rings+=`<circle cx="${cx}" cy="${cy}" r="${(R*f).toFixed(1)}" fill="none" stroke="#EFE9D8" stroke-width="1"/>`; });
  return `<svg width="180" height="180" viewBox="0 0 180 180">
    ${rings}${axes}
    <polygon points="${poly.join(' ')}" fill="${TYPES[top].hex}22" stroke="${TYPES[top].hex}" stroke-width="1.8" stroke-linejoin="round"/>
    ${dots}</svg>`;
}
window.exportCSV=function(){
  const rows=[["제출일시","아이이름","나이","성별","학부모","연락처",
    "1개혁가","2조력가","3성취가","4예술가","5탐구가","6충실가","7열정가","8도전가","9평화가","총점","대표유형"]];
  ADMIN_CACHE.forEach(s=>{
    const d=new Date(s.createdAt);
    const when=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    rows.push([when,s.info.name||"",s.info.age||"",s.info.gender||"",s.info.parent||"",s.info.phone||"",
      s.scores[1],s.scores[2],s.scores[3],s.scores[4],s.scores[5],s.scores[6],s.scores[7],s.scores[8],s.scores[9],
      s.total, `${s.top}. ${TYPES[s.top].name}`]);
  });
  const csv="\ufeff"+rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(",")).join("\r\n");
  const blob=new Blob([csv],{type:"text/csv;charset=utf-8"});
  const url=URL.createObjectURL(blob); const a=document.createElement("a");
  a.href=url; a.download=`에니어그램_결과_${new Date().toISOString().slice(0,10)}.csv`;
  document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
};

window.go=function(s){ ST.screen=s; render(); };
render();
</script>
